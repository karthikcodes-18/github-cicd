name: Hello World CI

on:
  push:
  workflow_dispatch:
    

jobs:
  hello-job:
    runs-on: ubuntu-22.04

    steps:
      - name: print Welcome
        run: echo "welcome to GH-A"

      - name: Print Date
        run: date

        
  hi-job:
    needs: hello-job
    runs-on:  ubuntu-latest

    steps: 
      - name: Print Hi
        run: echo "HI"

      - name: print background
        run: echo "ls -al"
    
