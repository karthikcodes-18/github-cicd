name: python ci pipeline

on:
  push:
    branches: ["develop"]
  workflow_dispatch:


jobs:
  Build:
    runs-on: ubuntu-22.04

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"


      - name: Requirments Installation
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: run tests
        run: pytest
        
      - name: generate- report
        run: |
          echo "Build Successfull" > report.txt

      - name: Upload Build Report
        uses: actions/upload-artifact@v4
        with:
          # Artifact name
          name: calci-report
          path: report.txt
      
          






          

      
